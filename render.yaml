services:
  - type: web
    name: imagelab-backend
    runtime: python
    buildCommand: |
      apt-get update && apt-get install -y \
        imagemagick \
        libmagic-dev \
        libmagickwand-dev \
        libgl1-mesa-glx \
        libglib2.0-0 \
        libsm6 \
        libxext6 \
        libxrender-dev \
        libgomp1 \
        fonts-dejavu-core
      pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
