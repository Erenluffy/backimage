version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: imagelab-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - imagelab-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: imagelab-db
    restart: always
    environment:
      POSTGRES_DB: imagelab
      POSTGRES_USER: imagelab_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - imagelab-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imagelab_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: imagelab-backend
    restart: always
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://imagelab_user:${DB_PASSWORD}@postgres:5432/imagelab
    env_file:
      - ../.env
    volumes:
      - ../static/uploads:/app/static/uploads
      - ../logs:/app/logs
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - imagelab-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: imagelab-celery-worker
    restart: always
    command: celery -A app.celery worker --loglevel=info
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://imagelab_user:${DB_PASSWORD}@postgres:5432/imagelab
    env_file:
      - ../.env
    volumes:
      - ../static/uploads:/app/static/uploads
      - ../logs:/app/logs
    depends_on:
      - backend
      - redis
      - postgres
    networks:
      - imagelab-network

  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: imagelab-celery-beat
    restart: always
    command: celery -A app.celery beat --loglevel=info
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ../.env
    volumes:
      - ../logs:/app/logs
    depends_on:
      - backend
      - redis
    networks:
      - imagelab-network

  nginx:
    image: nginx:alpine
    container_name: imagelab-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../config/nginx.conf:/etc/nginx/conf.d/default.conf
      - ../static:/var/www/static
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - imagelab-network

volumes:
  redis_data:
  postgres_data:

networks:
  imagelab-network:
    driver: bridge
